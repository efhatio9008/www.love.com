<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美淇我❤️你 - 粒子文字动画</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const textValue = "美淇我❤️你";

    let textParticles = [];
    let bgParticles = [];
    let mouse = {
      x: -9999,
      y: -9999,
      radius: 100
    };

    class TextParticle {
      constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = 1.8 + Math.random() * 1.6;
        this.density = Math.random() * 20 + 5;
        this.vx = 0;
        this.vy = 0;
        this.offset = Math.random() * Math.PI * 2;
      }

      update(time) {
        // 鼠标排斥
        const dxMouse = this.x - mouse.x;
        const dyMouse = this.y - mouse.y;
        const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

        if (distMouse < mouse.radius) {
          const force = (mouse.radius - distMouse) / mouse.radius;
          const angle = Math.atan2(dyMouse, dxMouse);
          this.vx += Math.cos(angle) * force * 2.5;
          this.vy += Math.sin(angle) * force * 2.5;
        }

        // 回到文字目标点 + 轻微漂浮
        const floatX = Math.sin(time * 0.0015 + this.offset) * 1.5;
        const floatY = Math.cos(time * 0.0015 + this.offset) * 1.5;

        const targetX = this.baseX + floatX;
        const targetY = this.baseY + floatY;

        this.vx += (targetX - this.x) * 0.05;
        this.vy += (targetY - this.y) * 0.05;

        this.vx *= 0.82;
        this.vy *= 0.82;

        this.x += this.vx;
        this.y += this.vy;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.shadowColor = "rgba(255,255,255,0.8)";
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class BgParticle {
      constructor() {
        this.reset();
        this.x = Math.random() * w;
        this.y = Math.random() * h;
      }

      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.7;
        this.vy = (Math.random() - 0.5) * 0.7;
        this.size = Math.random() * 2 + 0.6;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.fill();
      }
    }

    function buildTextParticles() {
      textParticles = [];

      const offCanvas = document.createElement("canvas");
      const offCtx = offCanvas.getContext("2d");

      offCanvas.width = w;
      offCanvas.height = h;

      // 字号随屏幕变化
      let fontSize = Math.min(w / 7, 120);
      if (w < 768) fontSize = Math.min(w / 6.2, 72);

      offCtx.clearRect(0, 0, w, h);
      offCtx.fillStyle = "#fff";
      offCtx.textAlign = "center";
      offCtx.textBaseline = "middle";
      offCtx.font = `bold ${fontSize}px sans-serif`;
      offCtx.fillText(textValue, w / 2, h / 2);

      const imageData = offCtx.getImageData(0, 0, w, h);
      const data = imageData.data;

      // 间距越小，字越精细
      let gap = 5;
      if (w < 768) gap = 4;

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const index = (y * w + x) * 4;
          const alpha = data[index + 3];
          if (alpha > 128) {
            textParticles.push(new TextParticle(x, y));
          }
        }
      }
    }

    function buildBgParticles() {
      bgParticles = [];
      let count = Math.floor((w * h) / 9000);
      count = Math.max(80, Math.min(count, 180));

      for (let i = 0; i < count; i++) {
        bgParticles.push(new BgParticle());
      }
    }

    function drawBgConnections() {
      for (let i = 0; i < bgParticles.length; i++) {
        for (let j = i + 1; j < bgParticles.length; j++) {
          const dx = bgParticles[i].x - bgParticles[j].x;
          const dy = bgParticles[i].y - bgParticles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 110) {
            const alpha = 1 - dist / 110;
            ctx.beginPath();
            ctx.moveTo(bgParticles[i].x, bgParticles[i].y);
            ctx.lineTo(bgParticles[j].x, bgParticles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.18})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function drawTextConnections() {
      // 给文字粒子也加一点轻微连线，会更像“活的”
      for (let i = 0; i < textParticles.length; i += 3) {
        for (let j = i + 1; j < textParticles.length; j += 6) {
          const dx = textParticles[i].x - textParticles[j].x;
          const dy = textParticles[i].y - textParticles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 22) {
            const alpha = 1 - dist / 22;
            ctx.beginPath();
            ctx.moveTo(textParticles[i].x, textParticles[i].y);
            ctx.lineTo(textParticles[j].x, textParticles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.12})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
    }

    function animate(time = 0) {
      // 半透明黑底，做出拖尾感
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, 0, w, h);

      // 背景粒子
      for (let p of bgParticles) {
        p.update();
      }
      drawBgConnections();
      for (let p of bgParticles) {
        p.draw();
      }

      // 文字粒子
      for (let p of textParticles) {
        p.update(time);
      }
      drawTextConnections();
      for (let p of textParticles) {
        p.draw();
      }

      requestAnimationFrame(animate);
    }

    function init() {
      buildTextParticles();
      buildBgParticles();
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("touchmove", (e) => {
      if (e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener("touchend", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener("resize", () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      init();
    });

    init();
    animate();
  </script>
</body>
</html>
