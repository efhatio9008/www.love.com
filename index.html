<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>美淇我❤️你</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, rgba(24,24,24,1) 0%, rgba(0,0,0,1) 68%);
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(0deg);
      transform-origin: center center;
      transition: transform 1.35s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .rotate-btn {
      pointer-events: auto;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22);
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,90,130,0.18));
      color: #fff;
      padding: 13px 22px;
      border-radius: 999px;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 8px 30px rgba(0,0,0,0.35),
        0 0 18px rgba(255,255,255,0.10),
        0 0 22px rgba(255,80,120,0.14);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease,
        background 0.22s ease;
      user-select: none;
    }

    .rotate-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.18) 35%,
        rgba(255,255,255,0.02) 55%,
        rgba(255,255,255,0) 100%
      );
      transform: translateX(-130%);
      transition: transform 0.7s ease;
    }

    .rotate-btn:hover::before {
      transform: translateX(130%);
    }

    .rotate-btn:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(255,255,255,0.38);
      box-shadow:
        0 10px 36px rgba(0,0,0,0.42),
        0 0 22px rgba(255,255,255,0.16),
        0 0 28px rgba(255,80,120,0.24);
    }

    .rotate-btn:active {
      transform: scale(0.96);
    }

    .rotate-btn .btn-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .rotate-btn .icon {
      font-size: 16px;
      display: inline-block;
      transition: transform 0.4s ease;
    }

    .rotate-btn.spinning .icon {
      transform: rotate(360deg);
    }

    .hint {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      letter-spacing: 0.4px;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
    }

    @media (max-width: 768px) {
      .controls {
        bottom: 22px;
      }

      .rotate-btn {
        font-size: 14px;
        padding: 12px 18px;
      }

      .rotate-btn .icon {
        font-size: 15px;
      }

      .hint {
        font-size: 11px;
        top: -30px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene">
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <div class="hint">点一下，转一圈 ✨</div>
      <button class="rotate-btn" id="rotateBtn">
        <span class="btn-inner">
          <span class="icon">↻</span>
          <span>Rotate 360°</span>
        </span>
      </button>
    </div>
  </div>

  <script>
    const scene = document.getElementById("scene");
    const rotateBtn = document.getElementById("rotateBtn");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let textParticles = [];
    let bgParticles = [];
    let heartParticles = [];
    let currentRotation = 0;

    const mouse = {
      x: -9999,
      y: -9999,
      radius: 110
    };

    rotateBtn.addEventListener("click", () => {
      currentRotation += 360;
      scene.style.transform = `rotate(${currentRotation}deg)`;

      rotateBtn.classList.remove("spinning");
      void rotateBtn.offsetWidth;
      rotateBtn.classList.add("spinning");

      setTimeout(() => {
        rotateBtn.classList.remove("spinning");
      }, 450);
    });

    class TextParticle {
      constructor(x, y, color = "white", size = 1.8) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = 0;
        this.vy = 0;
        this.size = size + Math.random() * 1.4;
        this.color = color;
        this.offset = Math.random() * Math.PI * 2;
      }

      update(time) {
        const dxMouse = this.x - mouse.x;
        const dyMouse = this.y - mouse.y;
        const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

        if (distMouse < mouse.radius) {
          const force = (mouse.radius - distMouse) / mouse.radius;
          const angle = Math.atan2(dyMouse, dxMouse);
          this.vx += Math.cos(angle) * force * 2.6;
          this.vy += Math.sin(angle) * force * 2.6;
        }

        const floatX = Math.sin(time * 0.0018 + this.offset) * 1.2;
        const floatY = Math.cos(time * 0.0018 + this.offset) * 1.2;

        const targetX = this.baseX + floatX;
        const targetY = this.baseY + floatY;

        this.vx += (targetX - this.x) * 0.05;
        this.vy += (targetY - this.y) * 0.05;

        this.vx *= 0.83;
        this.vy *= 0.83;

        this.x += this.vx;
        this.y += this.vy;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

        if (this.color === "heart") {
          ctx.fillStyle = "rgba(255, 70, 110, 0.96)";
          ctx.shadowColor = "rgba(255, 70, 110, 0.95)";
          ctx.shadowBlur = 13;
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.96)";
          ctx.shadowColor = "rgba(255,255,255,0.82)";
          ctx.shadowBlur = 8;
        }

        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class BgParticle {
      constructor() {
        this.reset();
        this.x = Math.random() * w;
        this.y = Math.random() * h;
      }

      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.72;
        this.vy = (Math.random() - 0.5) * 0.72;
        this.size = Math.random() * 2 + 0.6;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x <= 0 || this.x >= w) this.vx *= -1;
        if (this.y <= 0 || this.y >= h) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.74)";
        ctx.fill();
      }
    }

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      init();
    }

    function buildTextParticles() {
      textParticles = [];
      heartParticles = [];

      const offCanvas = document.createElement("canvas");
      const offCtx = offCanvas.getContext("2d");
      offCanvas.width = w;
      offCanvas.height = h;

      let fontSize = Math.min(w / 7, 120);
      if (w < 768) fontSize = Math.min(w / 5.8, 68);

      const chars = ["美", "淇", "我", "❤", "你"];
      const charGap = fontSize * 0.92;
      const totalWidth = charGap * (chars.length - 1);
      const startX = w / 2 - totalWidth / 2;
      const centerY = h / 2;

      offCtx.clearRect(0, 0, w, h);
      offCtx.textAlign = "center";
      offCtx.textBaseline = "middle";
      offCtx.font = `bold ${fontSize}px sans-serif`;
      offCtx.fillStyle = "#fff";

      chars.forEach((char, i) => {
        const x = startX + i * charGap;
        offCtx.fillText(char, x, centerY);
      });

      const imageData = offCtx.getImageData(0, 0, w, h).data;
      const gap = w < 768 ? 4 : 5;

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const index = (y * w + x) * 4;
          if (imageData[index + 3] > 128) {
            textParticles.push(new TextParticle(x, y, "white", 1.8));
          }
        }
      }

      const heartCanvas = document.createElement("canvas");
      const heartCtx = heartCanvas.getContext("2d");
      heartCanvas.width = w;
      heartCanvas.height = h;

      heartCtx.clearRect(0, 0, w, h);
      heartCtx.textAlign = "center";
      heartCtx.textBaseline = "middle";
      heartCtx.font = `bold ${fontSize}px sans-serif`;
      heartCtx.fillStyle = "#fff";
      heartCtx.fillText("❤", startX + 3 * charGap, centerY);

      const heartData = heartCtx.getImageData(0, 0, w, h).data;

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const index = (y * w + x) * 4;
          if (heartData[index + 3] > 128) {
            heartParticles.push(new TextParticle(x, y, "heart", 2.0));
          }
        }
      }

      textParticles = textParticles.filter(p => {
        for (let i = 0; i < heartParticles.length; i++) {
          const hp = heartParticles[i];
          if (Math.abs(p.baseX - hp.baseX) < gap / 2 && Math.abs(p.baseY - hp.baseY) < gap / 2) {
            return false;
          }
        }
        return true;
      });
    }

    function buildBgParticles() {
      bgParticles = [];
      let count = Math.floor((w * h) / 9000);
      count = Math.max(90, Math.min(count, 180));

      for (let i = 0; i < count; i++) {
        bgParticles.push(new BgParticle());
      }
    }

    function drawBgConnections() {
      for (let i = 0; i < bgParticles.length; i++) {
        for (let j = i + 1; j < bgParticles.length; j++) {
          const dx = bgParticles[i].x - bgParticles[j].x;
          const dy = bgParticles[i].y - bgParticles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 110) {
            const alpha = 1 - dist / 110;
            ctx.beginPath();
            ctx.moveTo(bgParticles[i].x, bgParticles[i].y);
            ctx.lineTo(bgParticles[j].x, bgParticles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.18})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function drawTextConnections(particles, maxDist, mode = "white") {
      for (let i = 0; i < particles.length; i += 3) {
        for (let j = i + 1; j < particles.length; j += 6) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDist) {
            const alpha = 1 - dist / maxDist;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);

            if (mode === "heart") {
              ctx.strokeStyle = `rgba(255,70,110,${alpha * 0.18})`;
            } else {
              ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.12})`;
            }

            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
    }

    function animate(time = 0) {
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, 0, w, h);

      for (const p of bgParticles) p.update();
      drawBgConnections();
      for (const p of bgParticles) p.draw();

      for (const p of textParticles) p.update(time);
      for (const p of heartParticles) p.update(time);

      drawTextConnections(textParticles, 22, "white");
      drawTextConnections(heartParticles, 24, "heart");

      for (const p of textParticles) p.draw();
      for (const p of heartParticles) p.draw();

      requestAnimationFrame(animate);
    }

    function init() {
      buildTextParticles();
      buildBgParticles();
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener("touchmove", (e) => {
      if (e.touches && e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive: true });

    window.addEventListener("touchend", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener("resize", resizeCanvas);

    init();
    animate();
  </script>
</body>
</html>
