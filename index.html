<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gift Effect Band Version + Music</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at center, rgba(26, 26, 38, 1) 0%, rgba(0, 0, 0, 1) 68%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      z-index: 20;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(135deg, rgba(255,95,140,0.95), rgba(255,195,70,0.95));
      color: #fff;
      padding: 13px 20px;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
      box-shadow:
        0 8px 30px rgba(0,0,0,0.35),
        0 0 20px rgba(255,120,120,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.04);
      box-shadow:
        0 10px 34px rgba(0,0,0,0.42),
        0 0 28px rgba(255,180,100,0.35);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .label {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      color: white;
      font-size: clamp(24px, 5vw, 54px);
      font-weight: bold;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.45s ease;
      text-shadow:
        0 0 12px rgba(255,255,255,0.28),
        0 0 22px rgba(255,180,80,0.25);
      pointer-events: none;
      white-space: nowrap;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,220,140,0.35), rgba(255,255,255,0) 60%);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flash" id="flash"></div>
  <div class="label" id="label">TTU</div>

  <div class="controls">
    <button class="btn" id="triggerBtn">✨ 触发礼物特效</button>
  </div>

  <!-- 音乐 -->
  <audio id="bgMusic" preload="auto" src="tiktok%20universo.mp3"></audio>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const triggerBtn = document.getElementById("triggerBtn");
    const label = document.getElementById("label");
    const flash = document.getElementById("flash");
    const bgMusic = document.getElementById("bgMusic");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let bgParticles = [];
    let sparks = [];
    let rocketTrail = [];
    let confetti = [];

    let effectState = "idle";
    let stateStart = 0;

    const rocket = {
      active: false,
      x: w / 2,
      y: h + 120,
      vy: -8.8,
      scale: 1
    };

    const stage = {
      active: false,
      t: 0,
      centerX: () => w / 2,
      centerY: () => h * 0.67
    };

    const earth = {
      angle: 0
    };

    class BgParticle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = 0.8 + Math.random() * 2.2;
        this.alpha = 0.35 + Math.random() * 0.45;
        if (!initial) this.y = h + 20;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.fill();
      }
    }

    class Spark {
      constructor(x, y, palette = "gold") {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 7;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 50 + Math.random() * 30;
        this.maxLife = this.life;
        this.size = 1.5 + Math.random() * 3.2;
        this.palette = palette;
        this.gravity = 0.03 + Math.random() * 0.06;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.992;
        this.life--;
      }

      draw() {
        const a = Math.max(this.life / this.maxLife, 0);
        const color = this.palette === "pink"
          ? `rgba(255,110,170,${a})`
          : `rgba(255,210,90,${a})`;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class TrailParticle {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = 1 + Math.random() * 2.8;
        this.life = 28 + Math.random() * 18;
        this.maxLife = this.life;
        this.size = 2 + Math.random() * 3;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
      }

      draw() {
        const a = Math.max(this.life / this.maxLife, 0);
        const color = `rgba(255,170,70,${a})`;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 14;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class Confetti {
      constructor() {
        this.x = Math.random() * w;
        this.y = -20 - Math.random() * h * 0.3;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = 1.5 + Math.random() * 2.8;
        this.size = 2 + Math.random() * 4;
        this.life = 180 + Math.random() * 80;
        this.maxLife = this.life;
        this.type = Math.random() > 0.5 ? "gold" : "pink";
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
      }

      draw() {
        const a = Math.max(this.life / this.maxLife, 0);
        const c = this.type === "gold"
          ? `rgba(255,210,90,${a})`
          : `rgba(255,120,190,${a})`;
        ctx.fillStyle = c;
        ctx.fillRect(this.x, this.y, this.size, this.size * 1.6);
      }
    }

    function initBgParticles() {
      bgParticles = [];
      const count = Math.max(90, Math.min(180, Math.floor((w * h) / 9000)));
      for (let i = 0; i < count; i++) bgParticles.push(new BgParticle());
    }

    function drawBgConnections() {
      for (let i = 0; i < bgParticles.length; i++) {
        for (let j = i + 1; j < bgParticles.length; j++) {
          const dx = bgParticles[i].x - bgParticles[j].x;
          const dy = bgParticles[i].y - bgParticles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 105) {
            const a = (1 - dist / 105) * 0.14;
            ctx.beginPath();
            ctx.moveTo(bgParticles[i].x, bgParticles[i].y);
            ctx.lineTo(bgParticles[j].x, bgParticles[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${a})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function createBurst(x, y, count = 120) {
      for (let i = 0; i < count; i++) {
        sparks.push(new Spark(x, y, Math.random() > 0.45 ? "gold" : "pink"));
      }
    }

    function createRocketExplosion(x, y) {
      for (let i = 0; i < 220; i++) {
        sparks.push(new Spark(x, y, Math.random() > 0.3 ? "gold" : "pink"));
      }
      for (let i = 0; i < 50; i++) confetti.push(new Confetti());
    }

    function drawRocket() {
      if (!rocket.active) return;

      ctx.save();
      ctx.translate(rocket.x, rocket.y);
      ctx.scale(rocket.scale, rocket.scale);

      ctx.beginPath();
      ctx.moveTo(0, 26);
      ctx.quadraticCurveTo(-8, 40, 0, 54);
      ctx.quadraticCurveTo(8, 40, 0, 26);
      ctx.fillStyle = "rgba(255,140,40,0.95)";
      ctx.shadowColor = "rgba(255,140,40,0.85)";
      ctx.shadowBlur = 18;
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(0, -36);
      ctx.quadraticCurveTo(16, -20, 14, 18);
      ctx.lineTo(-14, 18);
      ctx.quadraticCurveTo(-16, -20, 0, -36);
      ctx.fillStyle = "rgba(245,245,250,0.98)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, -30, 10, Math.PI, 0);
      ctx.fillStyle = "rgba(255,90,120,1)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, -6, 6, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(120,200,255,0.95)";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-14, 12);
      ctx.lineTo(-24, 24);
      ctx.lineTo(-10, 22);
      ctx.closePath();
      ctx.fillStyle = "rgba(255,90,120,0.95)";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(14, 12);
      ctx.lineTo(24, 24);
      ctx.lineTo(10, 22);
      ctx.closePath();
      ctx.fillStyle = "rgba(255,90,120,0.95)";
      ctx.fill();

      ctx.restore();
    }

    function updateRocket() {
      if (!rocket.active) return;

      rocket.y += rocket.vy;
      rocket.x += Math.sin(performance.now() * 0.01) * 0.5;

      for (let i = 0; i < 4; i++) {
        rocketTrail.push(new TrailParticle(rocket.x, rocket.y + 24));
      }

      if (rocket.y < h * 0.28) {
        rocket.active = false;
        createRocketExplosion(rocket.x, rocket.y);
        startState("band");
      }
    }

    function updateRocketTrail() {
      for (let i = rocketTrail.length - 1; i >= 0; i--) {
        rocketTrail[i].update();
        if (rocketTrail[i].life <= 0) rocketTrail.splice(i, 1);
      }
    }

    function drawRocketTrail() {
      for (const p of rocketTrail) p.draw();
    }

    function updateSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        sparks[i].update();
        if (sparks[i].life <= 0) sparks.splice(i, 1);
      }
    }

    function drawSparks() {
      for (const s of sparks) s.draw();
    }

    function updateConfetti() {
      for (let i = confetti.length - 1; i >= 0; i--) {
        confetti[i].update();
        if (confetti[i].life <= 0 || confetti[i].y > h + 30) confetti.splice(i, 1);
      }
    }

    function drawConfetti() {
      for (const c of confetti) c.draw();
    }

    function drawGlowLine(x1, y1, x2, y2, color, width = 3) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawGlowCircle(x, y, r, fill, blur = 12) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.shadowColor = fill;
      ctx.shadowBlur = blur;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawStageFloor(cx, cy) {
      ctx.beginPath();
      ctx.ellipse(cx, cy + 55, 180, 28, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,170,70,0.08)";
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(cx, cy + 55, 130, 18, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fill();
    }

    function drawEarth(x, y, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      drawGlowCircle(0, 0, 26, "rgba(90,170,255,0.95)", 16);

      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.arc(0, 0, 26, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(0, 0, 26, 10, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(0, 0, 14, 26, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "rgba(100,255,160,0.85)";
      ctx.beginPath();
      ctx.ellipse(-8, -2, 7, 4, 0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(9, 6, 8, 5, -0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawPerformerHead(x, y, color) {
      drawGlowCircle(x, y, 10, color, 14);
    }

    function drawGuitarist(x, y, t) {
      const sway = Math.sin(t * 0.12) * 6;
      const arm = Math.sin(t * 0.22) * 10;
      const leg = Math.cos(t * 0.18) * 8;

      drawPerformerHead(x, y - 62 + sway * 0.15, "rgba(255,225,170,0.98)");
      drawGlowLine(x, y - 52, x, y - 10, "rgba(255,255,255,0.92)", 4);

      drawGlowLine(x, y - 40, x - 24, y - 18 + arm * 0.2, "rgba(255,120,190,0.92)", 3);
      drawGlowLine(x, y - 40, x + 24, y - 18 - arm * 0.2, "rgba(255,210,90,0.95)", 3);

      drawGlowLine(x, y - 10, x - 18 - leg * 0.2, y + 22, "rgba(255,255,255,0.92)", 3);
      drawGlowLine(x, y - 10, x + 18 + leg * 0.2, y + 22, "rgba(255,255,255,0.92)", 3);

      ctx.save();
      ctx.translate(x + 18, y - 22);
      ctx.rotate(-0.45 + Math.sin(t * 0.12) * 0.08);

      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(-10, -16, 20, 32, 8);
      } else {
        ctx.rect(-10, -16, 20, 32);
      }
      ctx.fillStyle = "rgba(255,150,70,0.95)";
      ctx.shadowColor = "rgba(255,150,70,0.7)";
      ctx.shadowBlur = 16;
      ctx.fill();
      ctx.shadowBlur = 0;

      drawGlowLine(0, -18, 0, -44, "rgba(255,235,180,0.9)", 4);

      for (let i = -6; i <= 6; i += 4) {
        drawGlowLine(i, -14, i, 14, "rgba(255,255,255,0.35)", 1);
      }
      ctx.restore();
    }

    function drawDancer(x, y, t) {
      const bounce = Math.sin(t * 0.18) * 10;
      const armSwing = Math.sin(t * 0.22) * 24;
      const legSwing = Math.sin(t * 0.22 + Math.PI / 2) * 18;
      const bodyY = y + bounce;

      drawPerformerHead(x, bodyY - 58, "rgba(255,240,180,0.98)");
      drawGlowLine(x, bodyY - 48, x, bodyY - 4, "rgba(255,255,255,0.92)", 4);

      drawGlowLine(
        x, bodyY - 34,
        x - 26 - armSwing * 0.35, bodyY - 18 + Math.sin(t * 0.2) * 8,
        "rgba(255,120,190,0.92)", 3
      );
      drawGlowLine(
        x, bodyY - 34,
        x + 26 + armSwing * 0.35, bodyY - 18 - Math.sin(t * 0.2) * 8,
        "rgba(255,210,90,0.95)", 3
      );

      drawGlowLine(
        x, bodyY - 4,
        x - 20 - legSwing * 0.25, bodyY + 28,
        "rgba(255,255,255,0.92)", 3
      );
      drawGlowLine(
        x, bodyY - 4,
        x + 20 + legSwing * 0.25, bodyY + 28,
        "rgba(255,255,255,0.92)", 3
      );

      ctx.beginPath();
      ctx.ellipse(x, bodyY + 36, 42, 10, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,180,70,0.12)";
      ctx.fill();
    }

    function drawSinger(x, y, t) {
      const sway = Math.sin(t * 0.15 + 1.2) * 7;
      const arm = Math.sin(t * 0.2 + 0.8) * 8;
      const micPulse = 1 + Math.sin(t * 0.28) * 0.08;

      drawPerformerHead(x, y - 62 + sway * 0.15, "rgba(255,225,170,0.98)");
      drawGlowLine(x, y - 52, x, y - 10, "rgba(255,255,255,0.92)", 4);

      drawGlowLine(x, y - 40, x - 20, y - 18 + arm * 0.2, "rgba(255,120,190,0.92)", 3);
      drawGlowLine(x, y - 40, x + 12, y - 28, "rgba(255,210,90,0.95)", 3);

      drawGlowLine(x, y - 10, x - 14 - sway * 0.15, y + 22, "rgba(255,255,255,0.92)", 3);
      drawGlowLine(x, y - 10, x + 14 + sway * 0.15, y + 22, "rgba(255,255,255,0.92)", 3);

      drawGlowLine(x + 18, y - 42, x + 18, y + 12, "rgba(220,220,255,0.8)", 2.5);
      drawGlowCircle(x + 18, y - 46, 6 * micPulse, "rgba(180,220,255,0.95)", 12);

      for (let i = 0; i < 3; i++) {
        const ox = x + 28 + i * 10;
        const oy = y - 52 - i * 6;
        ctx.beginPath();
        ctx.arc(ox, oy, 2 + i, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.18 - i * 0.04})`;
        ctx.fill();
      }
    }

    function drawBand() {
      if (!stage.active) return;

      const t = stage.t;
      const cx = stage.centerX();
      const cy = stage.centerY();

      drawStageFloor(cx, cy);

      const leftX = cx - Math.min(140, w * 0.18);
      const centerX = cx;
      const rightX = cx + Math.min(140, w * 0.18);

      drawEarth(cx, cy - 145, earth.angle);
      drawGuitarist(leftX, cy, t);
      drawDancer(centerX, cy, t);
      drawSinger(rightX, cy, t);
    }

    function updateBand() {
      if (!stage.active) return;
      stage.t += 1;
      earth.angle += 0.03;

      if (Math.random() < 0.45) {
        const cx = stage.centerX();
        const cy = stage.centerY();
        const rx = (Math.random() - 0.5) * 260;
        const ry = (Math.random() - 0.5) * 120;
        sparks.push(new Spark(cx + rx, cy - 40 + ry, Math.random() > 0.5 ? "gold" : "pink"));
      }
    }

    function showFlash() {
      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 180);
    }

    async function playMusic() {
      try {
        bgMusic.pause();
        bgMusic.currentTime = 0;
        bgMusic.volume = 1.0;
        await bgMusic.play();
      } catch (err) {
        console.log("Music play blocked or failed:", err);
      }
    }

    function stopMusic() {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }

    function startState(next) {
      effectState = next;
      stateStart = performance.now();

      if (next === "burst") {
        label.style.opacity = "1";
        showFlash();
        createBurst(w / 2, h * 0.72, 160);
      }

      if (next === "rocket") {
        rocket.active = true;
        rocket.x = w / 2;
        rocket.y = h + 80;
      }

      if (next === "band") {
        stage.active = true;
        stage.t = 0;
      }

      if (next === "ending") {
        stage.active = false;
        label.style.opacity = "0";
        stopMusic();
      }
    }

    function triggerEffect() {
      if (effectState !== "idle") return;

      sparks = [];
      rocketTrail = [];
      confetti = [];
      stage.active = false;
      rocket.active = false;
      earth.angle = 0;

      playMusic();
      startState("burst");
    }

    function updateEffectTimeline(now) {
      const elapsed = now - stateStart;

      if (effectState === "burst" && elapsed > 900) {
        startState("rocket");
      } else if (effectState === "band" && elapsed > 4200) {
        startState("ending");
      } else if (effectState === "ending" && elapsed > 900) {
        effectState = "idle";
      }
    }

    function drawBackground() {
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.fillRect(0, 0, w, h);

      for (const p of bgParticles) p.update();
      drawBgConnections();
      for (const p of bgParticles) p.draw();
    }

    function animate(now = 0) {
      drawBackground();

      updateSparks();
      drawSparks();

      updateRocket();
      updateRocketTrail();
      drawRocketTrail();
      drawRocket();

      updateConfetti();
      drawConfetti();

      updateBand();
      drawBand();

      updateEffectTimeline(now);

      requestAnimationFrame(animate);
    }

    triggerBtn.addEventListener("click", triggerEffect);

    window.addEventListener("resize", () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initBgParticles();
    });

    initBgParticles();
    animate();
  </script>
</body>
</html>
